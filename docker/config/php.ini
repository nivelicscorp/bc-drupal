[PHP]
file_uploads = On
upload_max_filesize = 256M
post_max_size = 256M
expose_php = Off
error_reporting = E_ALL_& ~E_NOTICE
memory_limit = 512M;

[Date]
date.timezone="UTC"

[opcache]
opcache.enable=1
opcache.memory_consumption=128
opcache.max_accelerated_files=30000
opcache.revalidate_freq=0

# JIT disabled - causes SIGSEGV in PHP 8.3 with Drupal 11
# See: PHP bug with tracing JIT and class inheritance
opcache.jit_buffer_size=0
opcache.jit=off
max_execution_time = 120
